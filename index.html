<style>
  :root {
    --bg: #EEEDEA;
    --fg: #141414;
    --fg-dim: #6b6b6b;
    --border: #e0dfdb;
    --cell-empty: #e2e1dd;
    --cell-future: #e9e8e5;
    --done: #22C55E;
    --missed: #EF4444;
    --partial: #F59E0B;
    --accent: #141414;
    --card-bg: #f7f6f3;
    --green: #34D17E;          /* mint/spring accent */
    --green-soft: #C9F6DD;     /* soft pill */
    --glass-bg: rgba(255,255,255,0.45);
    --glass-border: rgba(255,255,255,0.65);
    --glass-shadow: 0 6px 24px rgba(20,20,20,0.06);
  }
  html[data-theme="dark"] {
    --bg: #070707;
    --fg: #ededed;
    --fg-dim: #888888;
    --border: #232323;
    --cell-empty: #1c1c1c;
    --cell-future: #121212;
    --done: #22C55E;
    --missed: #EF4444;
    --partial: #F59E0B;
    --accent: #ededed;
    --green: #5BE8A0;
    --green-soft: rgba(91,232,160,0.16);
    --glass-bg: rgba(255,255,255,0.045);
    --glass-border: rgba(255,255,255,0.09);
    --glass-shadow: 0 6px 24px rgba(0,0,0,0.45);
    --card-bg: #0c0c0c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 64px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    position: relative;
  }
  /* soft mint ambiance so glass cards have something to frost */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(640px 460px at 82% -6%, color-mix(in srgb, var(--green) 42%, transparent), transparent 70%),
      radial-gradient(560px 420px at -8% 8%, color-mix(in srgb, var(--green) 16%, transparent), transparent 70%);
    opacity: 0.5;
  }
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    -webkit-backdrop-filter: blur(18px) saturate(1.3);
    backdrop-filter: blur(18px) saturate(1.3);
  }
  /* keep uppercase consistent across form controls */
  button, input { text-transform: uppercase; }
  input::placeholder { text-transform: uppercase; }

  .wrap { max-width: 1180px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  h1 {
    font-size: 19px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.08em;
  }
  h1 .x { color: var(--done); font-weight: 700; padding: 0 0.12em; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  button {
    font-family: inherit;
    font-size: 13px;
    color: var(--fg);
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    border-radius: 4px;
  }
  button:hover { border-color: var(--fg-dim); }

  .view-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .view-switch button {
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--border);
    padding: 7px 14px;
  }
  .view-switch button:last-child { border-right: none; }
  .view-switch button.active { background: var(--accent); color: var(--bg); }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .section-title { font-size: 12px; font-weight: 600; color: var(--fg-dim); letter-spacing: 0.1em; }
  .add-row {
    display: flex;
    gap: 8px;
  }
  .add-row input {
    font-family: inherit;
    font-size: 13px;
    color: var(--fg);
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    width: 220px;
    max-width: 50vw;
  }
  .add-row input:focus { outline: none; border-color: var(--fg-dim); }
  .add-row input::placeholder { color: var(--fg-dim); }

  /* ---------- dashboard (fintech-style summary) ---------- */
  #dashboard { margin-bottom: 30px; }
  .dash-hero {
    border-radius: 18px;
    padding: 22px 24px 16px;
  }
  /* metric selector (radio chips) */
  .metric-select { display: flex; gap: 18px; flex-wrap: wrap; }
  .metric-opt {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--fg-dim); cursor: pointer; letter-spacing: 0.06em;
    background: none; border: none; padding: 0;
  }
  .metric-opt .dot {
    width: 11px; height: 11px; border-radius: 50%;
    border: 1.5px solid var(--fg-dim); display: inline-block; transition: all 0.12s;
  }
  .metric-opt.active { color: var(--fg); }
  .metric-opt.active .dot { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

  .hero-center { text-align: center; margin: 6px 0 2px; }
  .dash-hero .big {
    font-size: clamp(56px, 12vw, 116px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .dash-hero .big .k-unit { font-size: 0.42em; font-weight: 600; color: var(--fg-dim); letter-spacing: 0; }
  .dash-hero .hlabel { font-size: 10px; color: var(--fg-dim); letter-spacing: 0.14em; margin-top: 8px; }
  .dash-hero .delta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em; margin-top: 10px;
    padding: 4px 11px; border-radius: 999px; background: var(--green-soft);
  }
  .delta.up { color: #0a7c3b; }
  html[data-theme="dark"] .delta.up { color: var(--green); }
  .delta.dn { color: var(--missed); background: color-mix(in srgb, var(--missed) 14%, transparent); }

  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .goal-chip {
    font-size: 10px; color: var(--fg-dim); letter-spacing: 0.08em; cursor: pointer;
    border: 1px dashed var(--border); border-radius: 999px; padding: 4px 10px; background: none;
  }
  .goal-chip:hover { color: var(--fg); border-color: var(--fg-dim); }

  .spark { width: 100%; height: 132px; display: block; margin-top: 6px; }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .kpi { border-radius: 16px; padding: 15px 17px; }
  .kpi .k-label { font-size: 10px; color: var(--fg-dim); letter-spacing: 0.1em; }
  .kpi .k-val {
    font-size: 26px;
    font-weight: 700;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
  .kpi .k-val .k-unit { font-size: 13px; font-weight: 500; color: var(--fg-dim); margin-left: 2px; }
  .kpi .k-sub { font-size: 10px; color: var(--fg-dim); margin-top: 4px; min-height: 12px; }
  .kpi .k-sub.good { color: var(--green); }
  .kpi .k-sub.bad { color: var(--missed); }

  /* consistency heatmap summary */
  .heatcard { border-radius: 16px; padding: 15px 17px; margin-top: 12px; }
  .heatcard .k-label { font-size: 10px; color: var(--fg-dim); letter-spacing: 0.1em; margin-bottom: 10px; }
  .heatmap { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 1fr); gap: 3px; width: max-content; max-width: 100%; }
  .hm { width: 11px; height: 11px; border-radius: 2px; background: var(--cell-empty); }

  /* per-habit mini sparkline */
  .mini-spark { width: 96px; height: 26px; display: block; opacity: 0.9; }

  /* ---- container layout: week/month flow into columns; year stacks ---- */
  #habits.view-week, #habits.view-month {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
    align-items: start;
  }
  #habits.view-year .habit { margin-bottom: 10px; }

  .habit {
    border-radius: 14px;
    padding: 13px 14px 14px;
  }

  .habit-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .habit-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .habit-name { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }

  .stats { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
  .stat { color: var(--fg-dim); font-size: 10px; white-space: nowrap; }
  .stat b { color: var(--fg); font-size: 12px; font-weight: 700; }
  .stat .fire { color: var(--done); }

  .delete-btn {
    border: none;
    padding: 2px 6px;
    color: var(--fg-dim);
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.15s, color 0.12s;
  }
  .habit:hover .delete-btn,
  .delete-btn:focus-visible { opacity: 0.5; }
  .delete-btn:hover { opacity: 1; color: var(--missed); }

  /* ---- WEEK VIEW ---- */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .week-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .week-cell .dow { font-size: 9px; color: var(--fg-dim); }
  .week-cell .dnum { font-size: 8px; color: var(--fg-dim); }
  .day {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 4px;
    background: var(--cell-empty);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid transparent;
    transition: transform 0.08s;
    user-select: none;
  }
  .day:hover { border-color: var(--fg-dim); }
  .day:active { transform: scale(0.94); }
  .day.done { background: var(--done); }
  .day.missed { background: var(--missed); }
  .day.future { background: var(--cell-future); cursor: not-allowed; opacity: 0.6; }
  .day.today { box-shadow: 0 0 0 2px var(--fg); }

  /* ---- MONTH VIEW ---- */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .month-grid .mhead {
    font-size: 9px;
    color: var(--fg-dim);
    text-align: center;
    padding-bottom: 1px;
  }
  .mday {
    aspect-ratio: 1 / 1;
    border-radius: 3px;
    background: var(--cell-empty);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--fg-dim);
    border: 1px solid transparent;
    user-select: none;
  }
  .mday:hover { border-color: var(--fg-dim); }
  .mday.done { background: var(--done); color: #053b18; }
  .mday.missed { background: var(--missed); color: #4a0707; }
  .mday.future { background: var(--cell-future); cursor: not-allowed; opacity: 0.55; }
  .mday.blank { background: transparent; cursor: default; border: none; }
  .mday.today { box-shadow: 0 0 0 2px var(--fg); }

  .month-label { font-size: 10px; color: var(--fg-dim); margin-bottom: 6px; }

  /* ---- YEAR VIEW ---- */
  .year-scroll { overflow-x: auto; padding-bottom: 6px; }
  .year-grid {
    display: grid;
    grid-template-rows: repeat(7, 1fr);
    grid-auto-flow: column;
    grid-auto-columns: 12px;
    gap: 3px;
    width: max-content;
  }
  .ycell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    background: var(--cell-empty);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .ycell:hover { border-color: var(--fg-dim); }
  .ycell.done { background: var(--done); }
  .ycell.missed { background: var(--missed); }
  .ycell.future { background: var(--cell-future); cursor: not-allowed; }
  .ycell.pad { background: transparent; cursor: default; }
  .ycell.today { box-shadow: 0 0 0 1.5px var(--fg); }
  .year-months {
    display: flex;
    font-size: 10px;
    color: var(--fg-dim);
    gap: 3px;
    margin-bottom: 4px;
    width: max-content;
  }

  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--fg-dim);
    flex-wrap: wrap;
  }
  .legend .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; margin-right: 5px; }

  .empty-state {
    text-align: center;
    color: var(--fg-dim);
    padding: 48px 0;
    font-size: 13px;
  }

  .demo-note {
    grid-column: 1 / -1;
    width: 100%;
    font-size: 11px;
    color: var(--fg-dim);
    border: 1px dashed var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    margin-bottom: 4px;
  }

  /* ---- partial (some sub-items done) ---- */
  .day.partial, .ycell.partial { background: var(--partial); }
  .mday.partial { background: var(--partial); color: #4a3000; }

  /* ---- sub-item checklist ---- */
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 2px 0 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
  }
  .checklist-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 2px;
  }
  .checklist-head .count b { color: var(--fg); }
  .sub-item {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .sub-box {
    width: 17px;
    height: 17px;
    flex: 0 0 auto;
    border: 1.5px solid var(--fg-dim);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    line-height: 1;
    color: #fff;
  }
  .sub-item.checked .sub-box { background: var(--done); border-color: var(--done); }
  .sub-item.checked .sub-label { color: var(--fg-dim); text-decoration: line-through; }
  .sub-remove {
    margin-left: auto;
    border: none;
    background: none;
    color: var(--fg-dim);
    font-size: 11px;
    padding: 0 4px;
    opacity: 0;
    cursor: pointer;
  }
  .sub-item:hover .sub-remove { opacity: 0.55; }
  .sub-remove:hover { opacity: 1; color: var(--missed); }
  .add-sub {
    align-self: flex-start;
    border: none;
    background: none;
    border-radius: 0;
    font-size: 11px;
    padding: 2px 0;
    margin: -6px 0 14px;
    color: var(--fg-dim);
    opacity: 0.55;
    transition: opacity 0.12s, color 0.12s;
  }
  .add-sub:hover {
    border: none;
    opacity: 1;
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  footer { margin-top: 32px; font-size: 11px; color: var(--fg-dim); text-align: center; }

  /* crisper small-caps labels + a little more weight for an official feel */
  .stat, .month-label, .checklist-head, .week-cell .dow, .week-cell .dnum,
  .month-grid .mhead, .legend, footer, .demo-note, .year-months {
    letter-spacing: 0.06em;
  }
  .stat, .view-switch button, .checklist-head { font-weight: 500; }
  .view-switch button { letter-spacing: 0.06em; }
  #addBtn, .add-row input, .add-row input::placeholder { letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>done <span class="x">×</span> missed</h1>
    <div class="controls">
      <div class="view-switch" id="viewSwitch">
        <button data-view="week">week</button>
        <button data-view="month">month</button>
        <button data-view="year">year</button>
      </div>
      <button id="themeToggle" title="toggle theme">◐ theme</button>
    </div>
  </header>

  <section id="dashboard"></section>

  <div class="section-head">
    <span class="section-title">habits</span>
    <div class="add-row">
      <input id="habitInput" type="text" placeholder="new habit name..." maxlength="40" autocomplete="off">
      <button id="addBtn">+ add</button>
    </div>
  </div>

  <div id="habits"></div>

  <div class="legend">
    <span><span class="swatch" style="background:var(--done)"></span>done</span>
    <span><span class="swatch" style="background:var(--missed)"></span>missed</span>
    <span><span class="swatch" style="background:var(--partial)"></span>partial</span>
    <span><span class="swatch" style="background:var(--cell-empty)"></span>unlogged</span>
    <span><span class="swatch" style="background:var(--cell-future);border:1px solid var(--border)"></span>future</span>
    <span style="margin-left:auto">click a cell to toggle done → missed → clear</span>
  </div>

  <footer>data stored locally in your browser · offline-ready</footer>
</div>

<script>
(function () {
  "use strict";

  const STORE_KEY = "habit_tracker_v1";
  const THEME_KEY = "habit_tracker_theme";
  // When true, show non-persisted example habits on an empty load (for previewing).
  // When false, a fresh/empty install is seeded once with the real starter habits
  // (see seedStarter) which ARE saved.
  const SEED_DEMO = false;
  let demoActive = false;
  const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // ---------- state ----------
  let state = loadState();        // { habits: [{id, name, log:{ "YYYY-MM-DD": true|false }}] }
  let currentView = state.view || "week";
  let heroMetric = state.heroMetric || "consistency"; // consistency | completions | today
  let goal = (typeof state.goal === "number") ? state.goal : 0.8; // target consistency 0..1

  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.habits)) return parsed;
      }
    } catch (e) { /* fall through */ }
    return { habits: [], view: "week" };
  }

  function save() {
    if (demoActive) return; // never persist example data
    state.view = currentView;
    state.heroMetric = heroMetric;
    state.goal = goal;
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ---------- date helpers ----------
  function todayKey() { return dateKey(new Date()); }

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseKey(k) {
    const [y, m, d] = k.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function addDays(d, n) {
    const c = new Date(d);
    c.setDate(c.getDate() + n);
    return c;
  }

  // Monday = 0 ... Sunday = 6
  function isoDow(d) { return (d.getDay() + 6) % 7; }

  function isFuture(k) { return k > todayKey(); }

  // ---------- habit CRUD ----------
  function addHabit(name) {
    name = name.trim();
    if (!name) return;
    if (demoActive) { state.habits = []; demoActive = false; } // clear examples on first real habit
    state.habits.push({ id: "h" + Date.now() + Math.random().toString(36).slice(2, 6), name, log: {} });
    save();
    render();
  }

  function removeHabit(id) {
    const h = state.habits.find(x => x.id === id);
    if (!h) return;
    if (!confirm(`Delete habit "${h.name}" and all its data?`)) return;
    state.habits = state.habits.filter(x => x.id !== id);
    save();
    render();
  }

  // ---------- sub-item (checklist) helpers ----------
  function hasSubs(h) { return Array.isArray(h.subs) && h.subs.length > 0; }

  // status for a day: 'done' (all subs / logged true) | 'partial' (some subs) |
  // 'missed' (logged false, plain habits only) | '' (unlogged)
  function dayStatus(h, key) {
    if (hasSubs(h)) {
      const entry = (h.subLog && h.subLog[key]) || {};
      let done = 0;
      for (const s of h.subs) if (entry[s.id]) done++;
      if (done === h.subs.length) return "done";
      if (done > 0) return "partial";
      return "";
    }
    if (h.log[key] === true) return "done";
    if (h.log[key] === false) return "missed";
    return "";
  }

  function doneDaysList(h) {
    if (hasSubs(h)) {
      return Object.keys(h.subLog || {}).filter(k => dayStatus(h, k) === "done");
    }
    return Object.keys(h.log).filter(k => h.log[k] === true);
  }

  function toggleSub(id, subId, key) {
    if (isFuture(key)) return;
    const h = state.habits.find(x => x.id === id);
    if (!h || !hasSubs(h)) return;
    if (!h.subLog) h.subLog = {};
    const e = h.subLog[key] || (h.subLog[key] = {});
    if (e[subId]) delete e[subId]; else e[subId] = true;
    if (Object.keys(e).length === 0) delete h.subLog[key];
    save();
    render();
  }

  function addSub(id) {
    const h = state.habits.find(x => x.id === id);
    if (!h) return;
    const name = (prompt("New checklist item:") || "").trim();
    if (!name) return;
    if (!h.subs) h.subs = [];
    if (!h.subLog) h.subLog = {};
    h.subs.push({ id: "s" + Date.now() + Math.random().toString(36).slice(2, 5), name });
    save();
    render();
  }

  function removeSub(id, subId) {
    const h = state.habits.find(x => x.id === id);
    if (!h || !hasSubs(h)) return;
    const sub = h.subs.find(s => s.id === subId);
    if (sub && !confirm(`Remove checklist item "${sub.name}"?`)) return;
    h.subs = h.subs.filter(s => s.id !== subId);
    if (h.subLog) for (const k in h.subLog) { delete h.subLog[k][subId]; if (!Object.keys(h.subLog[k]).length) delete h.subLog[k]; }
    save();
    render();
  }

  // toggle a day cell. plain habit: undefined -> done -> missed -> clear.
  // checklist habit: clear <-> all items done (use the checklist for partials).
  function toggleDay(id, key) {
    if (isFuture(key)) return;
    const h = state.habits.find(x => x.id === id);
    if (!h) return;
    if (hasSubs(h)) {
      if (!h.subLog) h.subLog = {};
      if (dayStatus(h, key) === "done") {
        delete h.subLog[key];
      } else {
        const e = {};
        for (const s of h.subs) e[s.id] = true;
        h.subLog[key] = e;
      }
    } else {
      const cur = h.log[key];
      if (cur === undefined) h.log[key] = true;
      else if (cur === true) h.log[key] = false;
      else delete h.log[key];
    }
    save();
    render();
  }

  // ---------- streaks ----------
  // current streak = consecutive completed days ending today (or yesterday if today unlogged)
  function currentStreak(h) {
    let streak = 0;
    let cursor = new Date();
    // allow streak to count even if today not yet logged
    if (dayStatus(h, dateKey(cursor)) !== "done") {
      cursor = addDays(cursor, -1);
    }
    while (dayStatus(h, dateKey(cursor)) === "done") {
      streak++;
      cursor = addDays(cursor, -1);
    }
    return streak;
  }

  function longestStreak(h) {
    const doneDays = doneDaysList(h).sort();
    if (doneDays.length === 0) return 0;
    let longest = 1, run = 1;
    for (let i = 1; i < doneDays.length; i++) {
      const prev = parseKey(doneDays[i - 1]);
      const cur = parseKey(doneDays[i]);
      const diff = Math.round((cur - prev) / 86400000);
      if (diff === 1) { run++; } else { run = 1; }
      if (run > longest) longest = run;
    }
    return longest;
  }

  // ---------- rendering ----------
  const habitsEl = document.getElementById("habits");

  function cellClass(h, key) {
    if (isFuture(key)) return "future";
    return dayStatus(h, key); // 'done' | 'partial' | 'missed' | ''
  }

  // ---------- dashboard metrics ----------
  // per-habit credit for a day: done = 1, partial = 0.5, else 0
  function habitDayValue(h, key) {
    const s = dayStatus(h, key);
    return s === "done" ? 1 : (s === "partial" ? 0.5 : 0);
  }
  // average completion across all habits for a given day (0..1)
  function dailyRate(key) {
    if (!state.habits.length) return 0;
    let sum = 0;
    for (const h of state.habits) sum += habitDayValue(h, key);
    return sum / state.habits.length;
  }
  // the date keys (up to today) covered by the selected timeframe
  function windowDays() {
    const today = new Date();
    const tKey = todayKey();
    let start;
    if (currentView === "week") start = addDays(today, -isoDow(today));            // Mon of this week
    else if (currentView === "month") start = new Date(today.getFullYear(), today.getMonth(), 1);
    else start = addDays(today, -363);                                             // ~52 weeks
    const days = [];
    let c = new Date(start);
    while (dateKey(c) <= tKey) { days.push(dateKey(c)); c = addDays(c, 1); }
    return days;
  }
  // equal-length window immediately before the current one (for the delta)
  function prevWindow(win) {
    if (!win.length) return [];
    const start = parseKey(win[0]);
    const arr = [];
    for (let i = win.length; i >= 1; i--) arr.push(dateKey(addDays(start, -i)));
    return arr;
  }

  function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }

  function habitSeries(h) { return windowDays().map(k => habitDayValue(h, k)); }
  function habitConsistency(h) { const w = windowDays(); return w.length ? avg(w.map(k => habitDayValue(h, k))) : 0; }

  // area+line chart (Robinhood-style) from values in [0,1]; optional dashed goal line
  function sparkline(values, up, goalVal) {
    const W = 600, H = 140, pad = 8;
    if (!values.length) values = [0, 0];
    const n = values.length;
    const x = i => n === 1 ? W / 2 : pad + i * (W - 2 * pad) / (n - 1);
    const y = v => H - pad - v * (H - 2 * pad);
    let line = "";
    values.forEach((v, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " "; });
    let area = "M " + x(0).toFixed(1) + " " + (H - pad).toFixed(1) + " ";
    values.forEach((v, i) => { area += "L " + x(i).toFixed(1) + " " + y(v).toFixed(1) + " "; });
    area += "L " + x(n - 1).toFixed(1) + " " + (H - pad).toFixed(1) + " Z";
    const col = up ? "var(--green)" : "var(--missed)";
    const gid = up ? "sparkUp" : "sparkDn";
    let goalLine = "";
    if (typeof goalVal === "number") {
      const gy = y(goalVal).toFixed(1);
      goalLine = `<line x1="${pad}" y1="${gy}" x2="${W - pad}" y2="${gy}" stroke="var(--fg-dim)" stroke-width="1" stroke-dasharray="3 6" opacity="0.55" vector-effect="non-scaling-stroke"/>`;
    }
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#${gid})"/>
      ${goalLine}
      <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5"
            stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    </svg>`;
  }

  // small line-only sparkline for habit cards
  function miniSparkline(values) {
    const W = 200, H = 54, pad = 4;
    if (!values.length) values = [0, 0];
    const n = values.length;
    const x = i => n === 1 ? W / 2 : pad + i * (W - 2 * pad) / (n - 1);
    const y = v => H - pad - v * (H - 2 * pad);
    let line = "";
    values.forEach((v, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " "; });
    const up = values[n - 1] >= values[0];
    const col = up ? "var(--green)" : "var(--missed)";
    return `<svg class="mini-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${line}" fill="none" stroke="${col}" stroke-width="2"
            stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
  }

  function heatmapHTML() {
    const today = new Date(), tKey = todayKey(), weeks = 13;
    const startMon = addDays(today, -isoDow(today) - (weeks - 1) * 7);
    let cells = "";
    for (let c = 0; c < weeks; c++) {
      for (let r = 0; r < 7; r++) {
        const k = dateKey(addDays(startMon, c * 7 + r));
        let style = "";
        if (k > tKey) style = "background:transparent";
        else { const rate = dailyRate(k); if (rate > 0) style = `background:color-mix(in srgb, var(--green) ${Math.round(25 + rate * 75)}%, transparent)`; }
        cells += `<div class="hm" style="${style}" title="${k}"></div>`;
      }
    }
    return cells;
  }

  function renderDashboard() {
    const el = document.getElementById("dashboard");
    if (!el) return;
    const habits = state.habits;
    const tKey = todayKey();
    const win = windowDays();
    const pw = prevWindow(win);
    const series = win.map(dailyRate);
    const curAvg = avg(series);
    const prevAvg = avg(pw.map(dailyRate));

    let doneToday = 0;
    for (const h of habits) if (dayStatus(h, tKey) === "done") doneToday++;
    const todayPct = habits.length ? Math.round(doneToday / habits.length * 100) : 0;

    let best = 0, bestName = "—";
    for (const h of habits) { const s = currentStreak(h); if (s > best) { best = s; bestName = h.name; } }

    let comps = 0, prevComps = 0;
    for (const k of win) for (const h of habits) if (dayStatus(h, k) === "done") comps++;
    for (const k of pw) for (const h of habits) if (dayStatus(h, k) === "done") prevComps++;

    // top / worst habit by consistency over the timeframe
    let top = null, worst = null;
    if (habits.length) {
      const arr = habits.map(h => ({ name: h.name, c: habitConsistency(h) })).sort((a, b) => b.c - a.c);
      top = arr[0]; worst = arr[arr.length - 1];
    }

    const rangeLabel = currentView === "week" ? "this week" : currentView === "month" ? "this month" : "this year";

    // selected hero metric drives the big number + delta
    let bigHTML, hlabel, deltaVal, suffix, goalArg = goal;
    if (heroMetric === "completions") {
      bigHTML = `${comps}`;
      hlabel = `completions · ${rangeLabel}`;
      deltaVal = prevComps ? (comps - prevComps) / prevComps * 100 : (comps > 0 ? 100 : 0);
      suffix = "vs prev"; goalArg = null;
    } else if (heroMetric === "today") {
      bigHTML = `${todayPct}<span class="k-unit">%</span>`;
      hlabel = "today complete";
      deltaVal = (dailyRate(tKey) - dailyRate(dateKey(addDays(new Date(), -1)))) * 100;
      suffix = "vs yesterday";
    } else {
      bigHTML = `${Math.round(curAvg * 100)}<span class="k-unit">%</span>`;
      hlabel = `consistency · ${rangeLabel}`;
      deltaVal = (curAvg - prevAvg) * 100;
      suffix = "vs prev";
    }
    const up = deltaVal >= 0;
    const deltaStr = (up ? "▲ +" : "▼ −") + Math.abs(deltaVal).toFixed(1) + "% " + suffix;

    const metrics = [["consistency", "consistency"], ["completions", "completions"], ["today", "today"]];
    const sel = metrics.map(([id, lbl]) =>
      `<button class="metric-opt ${heroMetric === id ? "active" : ""}" data-metric="${id}"><span class="dot"></span>${lbl}</button>`).join("");

    el.innerHTML =
      `<div class="dash-hero glass">
        <div class="hero-top">
          <div class="metric-select">${sel}</div>
          <button class="goal-chip" id="goalChip">◎ goal ${Math.round(goal * 100)}%</button>
        </div>
        <div class="hero-center">
          <div class="big">${bigHTML}</div>
          <div class="hlabel">${hlabel}</div>
          <div class="delta ${up ? "up" : "dn"}">${deltaStr}</div>
        </div>
        ${sparkline(series, up, goalArg)}
      </div>
      <div class="kpis">
        <div class="kpi glass"><div class="k-label">today</div>
          <div class="k-val">${doneToday}<span class="k-unit">/${habits.length}</span></div>
          <div class="k-sub ${todayPct === 100 && habits.length ? "good" : ""}">${todayPct}% complete</div></div>
        <div class="kpi glass"><div class="k-label">best active streak</div>
          <div class="k-val">${best}<span class="k-unit">d</span></div>
          <div class="k-sub">${best ? bestName : "no active streak"}</div></div>
        <div class="kpi glass"><div class="k-label">completions · ${rangeLabel}</div>
          <div class="k-val">${comps}</div>
          <div class="k-sub">habit-days done</div></div>
        <div class="kpi glass"><div class="k-label">active habits</div>
          <div class="k-val">${habits.length}</div>
          <div class="k-sub">tracked</div></div>
        <div class="kpi glass"><div class="k-label">top habit · ${rangeLabel}</div>
          <div class="k-val">${top ? Math.round(top.c * 100) : 0}<span class="k-unit">%</span></div>
          <div class="k-sub good">${top ? top.name : "—"}</div></div>
        <div class="kpi glass"><div class="k-label">needs work</div>
          <div class="k-val">${worst && habits.length > 1 ? Math.round(worst.c * 100) : (worst ? Math.round(worst.c * 100) : 0)}<span class="k-unit">%</span></div>
          <div class="k-sub ${habits.length > 1 ? "bad" : ""}">${habits.length > 1 ? worst.name : "add more habits"}</div></div>
      </div>
      <div class="heatcard glass">
        <div class="k-label">consistency map · last 13 weeks</div>
        <div class="heatmap">${heatmapHTML()}</div>
      </div>`;

    el.querySelectorAll(".metric-opt").forEach(b => b.onclick = () => { heroMetric = b.dataset.metric; save(); renderDashboard(); });
    const gc = el.querySelector("#goalChip");
    if (gc) gc.onclick = () => {
      const v = prompt("Goal consistency % (1–100):", Math.round(goal * 100));
      if (v === null) return;
      const n = Math.max(1, Math.min(100, parseInt(v, 10) || 0));
      goal = n / 100; save(); renderDashboard();
    };
  }

  function render() {
    renderDashboard();

    // view switch active state
    document.querySelectorAll("#viewSwitch button").forEach(b => {
      b.classList.toggle("active", b.dataset.view === currentView);
    });

    // layout mode for the container (week/month flow side-by-side; year stacks)
    habitsEl.className = "view-" + currentView;

    habitsEl.innerHTML = "";

    if (state.habits.length === 0) {
      const e = document.createElement("div");
      e.className = "empty-state";
      e.textContent = "no habits yet — add one above to start tracking.";
      habitsEl.appendChild(e);
      return;
    }

    if (demoActive) {
      const note = document.createElement("div");
      note.className = "demo-note";
      note.textContent = "showing example data ↓ — add your own habit above to begin (examples clear once you do)";
      habitsEl.appendChild(note);
    }

    for (const h of state.habits) {
      habitsEl.appendChild(renderHabit(h));
    }
  }

  function renderHabit(h) {
    const card = document.createElement("div");
    card.className = "habit glass";

    const head = document.createElement("div");
    head.className = "habit-head";

    const left = document.createElement("div");
    const name = document.createElement("div");
    name.className = "habit-name";
    name.textContent = h.name;
    left.appendChild(name);

    const stats = document.createElement("div");
    stats.className = "stats";
    const cur = currentStreak(h);
    const lng = longestStreak(h);
    stats.innerHTML =
      `<span class="stat">current <b class="fire">${cur}</b> ${cur === 1 ? "day" : "days"}</span>` +
      `<span class="stat">longest <b>${lng}</b> ${lng === 1 ? "day" : "days"}</span>`;
    left.appendChild(stats);
    head.appendChild(left);

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.textContent = "✕";
    del.title = "remove habit";
    del.setAttribute("aria-label", "remove habit");
    del.onclick = () => removeHabit(h.id);

    const right = document.createElement("div");
    right.className = "habit-right";
    right.innerHTML = miniSparkline(habitSeries(h));
    right.appendChild(del);
    head.appendChild(right);

    card.appendChild(head);

    // today's sub-item checklist
    if (hasSubs(h)) {
      const tKey = todayKey();
      const entry = (h.subLog && h.subLog[tKey]) || {};
      const done = h.subs.filter(s => entry[s.id]).length;

      const cl = document.createElement("div");
      cl.className = "checklist";

      const chead = document.createElement("div");
      chead.className = "checklist-head";
      chead.innerHTML = `<span>today's checklist</span><span class="count"><b>${done}</b>/${h.subs.length}</span>`;
      cl.appendChild(chead);

      for (const s of h.subs) {
        const checked = !!entry[s.id];
        const item = document.createElement("div");
        item.className = "sub-item" + (checked ? " checked" : "");

        const box = document.createElement("span");
        box.className = "sub-box";
        box.textContent = checked ? "✓" : "";

        const lab = document.createElement("span");
        lab.className = "sub-label";
        lab.textContent = s.name;

        const rm = document.createElement("button");
        rm.className = "sub-remove";
        rm.textContent = "✕";
        rm.title = "remove item";
        rm.onclick = (e) => { e.stopPropagation(); removeSub(h.id, s.id); };

        item.appendChild(box);
        item.appendChild(lab);
        item.appendChild(rm);
        item.onclick = () => toggleSub(h.id, s.id, tKey);
        cl.appendChild(item);
      }
      card.appendChild(cl);
    }

    // add-checklist-item button
    const addItem = document.createElement("button");
    addItem.className = "add-sub";
    addItem.textContent = hasSubs(h) ? "+ item" : "+ checklist";
    addItem.title = "add a checklist item";
    addItem.onclick = () => addSub(h.id);
    card.appendChild(addItem);

    if (currentView === "week") card.appendChild(renderWeek(h));
    else if (currentView === "month") card.appendChild(renderMonth(h));
    else card.appendChild(renderYear(h));

    return card;
  }

  function makeToggleCell(el, h, key) {
    if (!isFuture(key)) {
      el.title = key;
      el.onclick = () => toggleDay(h.id, key);
    } else {
      el.title = key + " (future)";
    }
  }

  // ---- WEEK: last 7 days, Mon-Sun ordering of the current week window ----
  function renderWeek(h) {
    const grid = document.createElement("div");
    grid.className = "week-grid";

    const today = new Date();
    // Start from Monday of the current week
    const monday = addDays(today, -isoDow(today));
    const tKey = todayKey();

    for (let i = 0; i < 7; i++) {
      const d = addDays(monday, i);
      const key = dateKey(d);

      const cell = document.createElement("div");
      cell.className = "week-cell";

      const dow = document.createElement("div");
      dow.className = "dow";
      dow.textContent = DAY_NAMES[i];

      const day = document.createElement("div");
      day.className = "day " + cellClass(h, key);
      if (key === tKey) day.classList.add("today");

      const dnum = document.createElement("div");
      dnum.className = "dnum";
      dnum.textContent = `${MONTH_NAMES[d.getMonth()].toLowerCase()} ${d.getDate()}`;

      makeToggleCell(day, h, key);

      cell.appendChild(dow);
      cell.appendChild(day);
      cell.appendChild(dnum);
      grid.appendChild(cell);
    }
    return grid;
  }

  // ---- MONTH: current calendar month ----
  function renderMonth(h) {
    const wrap = document.createElement("div");

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const tKey = todayKey();

    const label = document.createElement("div");
    label.className = "month-label";
    label.textContent = `${MONTH_NAMES[month]} ${year}`;
    wrap.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "month-grid";

    for (const dn of DAY_NAMES) {
      const hd = document.createElement("div");
      hd.className = "mhead";
      hd.textContent = dn[0];
      grid.appendChild(hd);
    }

    const first = new Date(year, month, 1);
    const lead = isoDow(first); // number of blanks before day 1
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < lead; i++) {
      const b = document.createElement("div");
      b.className = "mday blank";
      grid.appendChild(b);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const key = dateKey(d);
      const cell = document.createElement("div");
      cell.className = "mday " + cellClass(h, key);
      if (key === tKey) cell.classList.add("today");
      cell.textContent = day;
      makeToggleCell(cell, h, key);
      grid.appendChild(cell);
    }

    wrap.appendChild(grid);
    return wrap;
  }

  // ---- YEAR: 52+ week columns x 7 rows, GitHub-style ----
  function renderYear(h) {
    const wrap = document.createElement("div");
    wrap.className = "year-scroll";

    const today = new Date();
    const tKey = todayKey();

    // End on the Sunday of the current week; go back 52 weeks (53 columns to cover a full year).
    const COLS = 53;
    const endSunday = addDays(today, 6 - isoDow(today)); // Sunday of current week
    const startMonday = addDays(endSunday, -(COLS * 7 - 1)); // first cell (a Monday)

    // month labels row
    const monthRow = document.createElement("div");
    monthRow.className = "year-months";
    let lastMonth = -1;
    for (let c = 0; c < COLS; c++) {
      const colDate = addDays(startMonday, c * 7);
      const m = colDate.getMonth();
      const lbl = document.createElement("div");
      lbl.style.width = "12px";
      if (m !== lastMonth) {
        lbl.textContent = MONTH_NAMES[m].toLowerCase();
        lbl.style.width = "auto";
        lbl.style.minWidth = "12px";
        lastMonth = m;
      } else {
        lbl.innerHTML = "&nbsp;";
      }
      monthRow.appendChild(lbl);
    }

    const grid = document.createElement("div");
    grid.className = "year-grid";

    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < 7; r++) {
        const d = addDays(startMonday, c * 7 + r);
        const key = dateKey(d);
        const cell = document.createElement("div");
        cell.className = "ycell " + cellClass(h, key);
        if (key === tKey) cell.classList.add("today");
        makeToggleCell(cell, h, key);
        grid.appendChild(cell);
      }
    }

    wrap.appendChild(monthRow);
    wrap.appendChild(grid);
    return wrap;
  }

  // ---------- theme ----------
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  }

  function initTheme() {
    let theme;
    try { theme = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (!theme) {
      theme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    applyTheme(theme);
  }

  // ---------- events ----------
  document.getElementById("addBtn").onclick = () => {
    const input = document.getElementById("habitInput");
    addHabit(input.value);
    input.value = "";
    input.focus();
  };
  document.getElementById("habitInput").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("addBtn").click();
  });

  document.getElementById("viewSwitch").addEventListener("click", e => {
    const btn = e.target.closest("button[data-view]");
    if (!btn) return;
    currentView = btn.dataset.view;
    save();
    render();
  });

  document.getElementById("themeToggle").onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur === "dark" ? "light" : "dark");
  };

  // ---------- demo data ----------
  // Builds example habits with realistic histories (done / missed / unlogged)
  // so all three views look populated. Deterministic so it renders the same
  // each load. Not saved — toggling a cell or adding a habit takes over.
  function seedDemo() {
    const today = new Date();
    // recent: statuses for the last days (index 0 = today, 1 = yesterday, ...),
    // each 'd' done / 'm' missed / 'u' unlogged — overrides the random history so
    // the week view shows a deliberate mix of streaks, misses, and empty days.
    function mk(name, days, doneProb, streak, missRatio, seed, recent) {
      let s = seed >>> 0;
      const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
      const log = {};
      for (let i = days; i >= 0; i--) {
        const k = dateKey(addDays(today, -i));
        if (i < streak) { log[k] = true; continue; }   // guaranteed recent streak
        const r = rnd();
        if (r < doneProb) log[k] = true;
        else if (rnd() < missRatio) log[k] = false;     // explicit "missed" (red)
        // otherwise leave unlogged (grey)
      }
      if (recent) {
        for (let i = 0; i < recent.length; i++) {
          const k = dateKey(addDays(today, -i));
          const v = recent[i];
          if (v === 'd') log[k] = true;
          else if (v === 'm') log[k] = false;
          else delete log[k];                           // 'u' = unlogged
        }
      }
      return { id: "demo_" + name.replace(/\W+/g, "_"), name, log };
    }
    // checklist habit: "done" only when every item is ticked, "partial" otherwise
    function mkMeds() {
      const subs = [{ id: "sub_vyvanse", name: "vyvanse" }, { id: "sub_wellbutrin", name: "wellbutrin" }];
      let s = 24681357 >>> 0;
      const rnd = () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
      const subLog = {};
      for (let i = 60; i >= 0; i--) {
        const k = dateKey(addDays(today, -i));
        const r = rnd();
        if (r < 0.8) subLog[k] = { sub_vyvanse: true, sub_wellbutrin: true }; // both → done
        else if (r < 0.9) subLog[k] = { sub_vyvanse: true };                  // one → partial
        // else none → unlogged
      }
      subLog[dateKey(today)] = { sub_vyvanse: true }; // today: partial, to show the state
      return { id: "demo_take_meds", name: "take meds", subs, subLog, log: {} };
    }
    state.habits = [
      mkMeds(),
      // clean long streak (no recent override)
      mk("read 30min",   140, 0.88, 14, 0.6, 12345),
      // mix of misses + an empty day this week
      mk("workout",       95, 0.62,  0, 0.7, 67890, ['d','d','m','d','u','m','d']),
      // missed today, broken streak
      mk("meditate",     220, 0.74,  0, 0.5, 13579, ['m','d','d','u','d','m','d']),
      // strong streak example
      mk("drink water",   50, 0.92,  9, 0.5, 24680),
      // lots of variety incl. empty days
      mk("journal",       20, 0.55,  0, 0.6, 99999, ['u','d','m','u','d','d','m']),
    ];
    demoActive = true;
  }

  // Real starter habits for a fresh install — saved (unlike the demo).
  function seedStarter() {
    state.habits = [{
      id: "take_meds",
      name: "take meds",
      subs: [{ id: "sub_vyvanse", name: "vyvanse" }, { id: "sub_wellbutrin", name: "wellbutrin" }],
      subLog: {},
      log: {}
    }];
    state.seeded = true; // guard so deleting all habits doesn't re-seed
    save();
  }

  // ---------- boot ----------
  initTheme();
  if (state.habits.length === 0) {
    if (SEED_DEMO) seedDemo();
    else if (!state.seeded) seedStarter();
  }
  render();
})();
</script>
